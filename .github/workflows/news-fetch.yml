name: News Fetch Pipeline

on:
  schedule:
    # UTC 時間，每 3 小時執行一次
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run news fetch pipeline
        env:
          GEMINI_API_KEY1: ${{ secrets.GEMINI_API_KEY1 }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_BASEURL: ${{ secrets.LANGFUSE_BASEURL }}
        run: node src/runNewsFetch.mjs

      - name: Commit news pool updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update news pool [skip ci]"
          file_pattern: |
            data/news/pool_active.json
            data/news/archive/*.json
            data/news/.gitkeep
            data/news/archive/.gitkeep
