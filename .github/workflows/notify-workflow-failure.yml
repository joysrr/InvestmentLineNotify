name: Notify Workflow Failure

on:
  workflow_run:
    workflows:
      - "Daily Report & Notify Scheduler "
      - "News Fetch Pipeline"
      - "Rule Optimizer Scheduler"
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  notify-on-failure:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.name != 'Notify Workflow Failure'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram failure alert
        env:
          TELEGRAM_API_TOKEN: ${{ secrets.TELEGRAM_API_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_TIME: ${{ github.event.workflow_run.updated_at }}
          REPO: ${{ github.repository }}
        run: |
          message=$(cat <<EOF
          ❌ GitHub Actions 排程失敗

          📦 Repo：${REPO}
          📋 Workflow：${WORKFLOW_NAME}
          🔗 執行紀錄：${RUN_URL}
          ⏰ 時間：${RUN_TIME}
          EOF
          )

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_API_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_USER_ID}" \
            --data-urlencode text="${message}"