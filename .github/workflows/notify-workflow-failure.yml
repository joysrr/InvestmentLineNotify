name: Notify Workflow Failure

on:
  workflow_run:
    workflows:
      - "Daily Report & Notify Scheduler"
      - "News Fetch Pipeline"
      - "Rule Optimizer Scheduler"
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  notify-on-failure:
    if: >
      ${{
        (github.event.workflow_run.conclusion == 'failure' ||
         github.event.workflow_run.conclusion == 'cancelled' ||
         github.event.workflow_run.conclusion == 'timed_out') &&
        github.event.workflow_run.name != 'Notify Workflow Failure'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram failure alert
        env:
          TELEGRAM_API_TOKEN: ${{ secrets.TELEGRAM_API_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_TIME: ${{ github.event.workflow_run.updated_at }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          TRIGGER: ${{ github.event.workflow_run.event }}
          REPO: ${{ github.repository }}
        run: |
          case "$CONCLUSION" in
            failure)    ICON="❌" ;;
            cancelled)  ICON="⚠️" ;;
            timed_out)  ICON="⏱️" ;;
            *)          ICON="🔴" ;;
          esac

          case "$TRIGGER" in
            schedule)           TRIGGER_LABEL="排程自動觸發" ;;
            workflow_dispatch)  TRIGGER_LABEL="手動觸發" ;;
            *)                  TRIGGER_LABEL="$TRIGGER" ;;
          esac

          message=$(cat <<EOF
          ${ICON} GitHub Actions 排程異常

          📋 Workflow：${WORKFLOW_NAME}
          🔢 Run：#${RUN_NUMBER}
          📌 狀態：${CONCLUSION}
          🕹️ 觸發：${TRIGGER_LABEL}
          ⏰ 時間：${RUN_TIME}
          📦 Repo：${REPO}
          🔗 執行紀錄：${RUN_URL}
          EOF
          )

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_API_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_USER_ID}" \
            --data-urlencode text="${message}"
